variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip
    - .cache/npm
    - node_modules/

stages:
  - format
  - lint
  - type_check
  - security
  - dependency-audit
  - test
  - build
  - changelog
  - deploy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

frontend_format:
  stage: format
  script:
    - docker run --rm -v "${PWD}:/app" -w /app node:20-alpine sh -c "npm install && npm run format:check"
  rules:
    - changes:
      - "**/*.js"
      - "**/*.css"
      - "**/*.html"
      - "package*.json"
      - "biome.json"

backend_format:
  stage: format
  script:
    - docker run --rm -v "${PWD}:/app" -v "${PWD}/.cache/pip:/root/.cache/pip" -w /app python:3.11-slim bash -c "pip install ruff && ruff format --check . && ruff check ."
  rules:
    - changes:
      - "**/*.py"
      - "requirements.txt"
      - "pyproject.toml"

frontend_lint:
  stage: lint
  script:
    - docker run --rm -v "${PWD}:/app" -w /app node:20-alpine sh -c "npm install && npm run lint && npm run deadcode"
  rules:
    - changes:
      - "**/*.js"
      - "**/*.css"
      - "**/*.html"
      - "package*.json"
      - "knip.json"

backend_lint:
  stage: lint
  script:
    - docker run --rm -v "${PWD}:/app" -v "${PWD}/.cache/pip:/root/.cache/pip" -w /app python:3.11-slim bash -c "pip install ruff && ruff check ."
  rules:
    - changes:
      - "**/*.py"
      - "requirements.txt"
      - "pyproject.toml"

type_check:
  stage: type_check
  script:
    - docker run --rm -v "${PWD}:/app" -v "${PWD}/.cache/pip:/root/.cache/pip" -w /app python:3.11-slim bash -c "pip install mypy -r requirements.txt && mypy app run.py --ignore-missing-imports"
  rules:
    - changes:
      - "**/*.py"
      - "requirements.txt"
      - "pyproject.toml"

security_bandit:
  stage: security
  script:
    - docker run --rm -v "${PWD}:/app" -v "${PWD}/.cache/pip:/root/.cache/pip" -w /app python:3.11-slim bash -c "pip install bandit && bandit -r . -ll -c pyproject.toml"
  rules:
    - changes:
      - "**/*.py"
      - "requirements.txt"
      - "pyproject.toml"

security_gitleaks:
  stage: security
  script:
    - docker run --rm -v "${PWD}:/path" zricethezav/gitleaks:latest detect --source /path -v

dependency_audit:
  stage: dependency-audit
  script:
    - docker run --rm -v "${PWD}:/app" -w /app python:3.11-slim bash -c "pip install pip-audit && pip-audit -r requirements.txt -r ml-requirements.txt --no-deps --format json --output pip-audit-report.json"
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - pip-audit-report.json

backend_coverage:
  stage: test
  script:
    - docker run --rm -v "${PWD}:/app" -v "${PWD}/.cache/pip:/root/.cache/pip" -w /app python:3.11-slim bash -c "pip install pytest pytest-cov coverage -r requirements.txt && pytest --cov=. --cov-report=term-missing --cov-report=xml:coverage/backend/coverage.xml --cov-report=html:coverage/backend/html --junitxml=coverage/backend/junit.xml && coverage report --precision=2"
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+(?:\.\d+)?)%/'
  rules:
    - changes:
      - "**/*.py"
      - "requirements.txt"
      - "pyproject.toml"
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - coverage/backend/
    reports:
      junit: coverage/backend/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/backend/coverage.xml

frontend_coverage:
  stage: test
  script:
    - docker run --rm -v "${PWD}:/app" -w /app node:20-alpine sh -c "npm install && npm run test:ci"
  coverage: '/All files[^|]*\|[^|]*\s+(\d+(?:\.\d+)?)/'
  rules:
    - changes:
      - "**/*.js"
      - "**/*.css"
      - "**/*.html"
      - "package*.json"
      - "jest.config.js"
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - coverage/frontend/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/frontend/cobertura-coverage.xml

build:
  stage: build
  script:
    - docker pull $CI_REGISTRY_IMAGE:latest || true
    - docker build --cache-from $CI_REGISTRY_IMAGE:latest -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" .
    - docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

changelog:
  stage: changelog
  script:
    - docker run --rm -v "${PWD}:/app" -w /app orhunp/git-cliff:latest --unreleased --prepend CHANGELOG.md
  rules:
    - if: $CI_COMMIT_TAG

deploy_staging:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying to staging environment via Render API..."
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
