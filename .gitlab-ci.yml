default:
  before_script:
    - $env:PATH = "C:\Users\karth\AppData\Local\Programs\Python\Python313\;C:\Users\karth\AppData\Local\Programs\Python\Python313\Scripts\;C:\Program Files\nodejs\;" + $env:PATH

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip
    - .cache/npm
    - node_modules/

stages:
  - format
  - lint
  - type_check
  - security
  - dependency-audit
  - test
  - build
  - changelog
  - deploy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

frontend_format:
  stage: format
  image: node:20-alpine
  script:
    - npm install
    - npm run format:check
  rules:
    - changes:
      - "**/*.js"
      - "**/*.css"
      - "**/*.html"
      - "package*.json"
      - "biome.json"

backend_format:
  stage: format
  image: python:3.11-slim
  script:
    - pip install ruff
    - ruff format --check .
    - ruff check .
  rules:
    - changes:
      - "**/*.py"
      - "requirements.txt"
      - "pyproject.toml"

frontend_lint:
  stage: lint
  image: node:20-alpine
  script:
    - npm install
    - npm run lint
    - npm run deadcode
  rules:
    - changes:
      - "**/*.js"
      - "**/*.css"
      - "**/*.html"
      - "package*.json"
      - "knip.json"

backend_lint:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install ruff
    - ruff check .
  rules:
    - changes:
      - "**/*.py"
      - "requirements.txt"
      - "pyproject.toml"

type_check:
  stage: type_check
  image: python:3.11-slim
  script:
    - pip install mypy -r requirements.txt
    - mypy app run.py --ignore-missing-imports
  rules:
    - changes:
      - "**/*.py"
      - "requirements.txt"
      - "pyproject.toml"

security_bandit:
  stage: security
  image: python:3.11-slim
  script:
    - pip install bandit
    - bandit -r . -ll -c pyproject.toml
  rules:
    - changes:
      - "**/*.py"
      - "requirements.txt"
      - "pyproject.toml"

security_gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - Invoke-WebRequest -Uri "https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_windows_x64.zip" -OutFile "gitleaks.zip"
    - Expand-Archive -Path "gitleaks.zip" -DestinationPath "."
    - .\gitleaks.exe detect --source . -v

dependency_audit:
  stage: dependency-audit
  image: python:3.11-slim
  script:
    - pip install pip-audit
    - pip-audit -r requirements.txt -r ml-requirements.txt --no-deps --format json --output pip-audit-report.json; $global:LASTEXITCODE = 0
    - if (-not (Test-Path "pip-audit-report.json")) { Set-Content -Path "pip-audit-report.json" -Value "[]" }
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - pip-audit-report.json

backend_coverage:
  stage: test
  image: python:3.11-slim
  script:
    - pip install pytest pytest-cov coverage -r requirements.txt
    - pytest --cov=. --cov-report=term-missing --cov-report=xml:coverage/backend/coverage.xml --cov-report=html:coverage/backend/html --junitxml=coverage/backend/junit.xml
    - coverage report --precision=2
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+(?:\.\d+)?)%/'
  rules:
    - changes:
      - "**/*.py"
      - "requirements.txt"
      - "pyproject.toml"
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - coverage/backend/
    reports:
      junit: coverage/backend/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/backend/coverage.xml

frontend_coverage:
  stage: test
  image: node:20-alpine
  script:
    - npm install
    - npm run test:ci
  coverage: '/All files[^|]*\|[^|]*\s+(\d+(?:\.\d+)?)/'
  rules:
    - changes:
      - "**/*.js"
      - "**/*.css"
      - "**/*.html"
      - "package*.json"
      - "jest.config.js"
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - coverage/frontend/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/frontend/cobertura-coverage.xml

build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - Write-Host "Skipping docker build on Windows shell runner because Docker daemon is not accessible."
    - $global:LASTEXITCODE = 0
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

changelog:
  stage: changelog
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  script:
    - Invoke-WebRequest -Uri "https://github.com/orhun/git-cliff/releases/download/v2.2.2/git-cliff-2.2.2-x86_64-pc-windows-msvc.zip" -OutFile "git-cliff.zip"
    - Expand-Archive -Path "git-cliff.zip" -DestinationPath "."
    - .\git-cliff-2.2.2-x86_64-pc-windows-msvc\git-cliff.exe --unreleased --prepend CHANGELOG.md
  rules:
    - if: $CI_COMMIT_TAG

deploy_staging:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying to staging environment via Render API..."
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
