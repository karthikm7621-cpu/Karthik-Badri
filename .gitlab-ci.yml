image: python:3.11-slim

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

cache:
  paths:
    - .cache/pip

stages:
  - format
  - lint
  - type_check
  - security
  - dependency-audit
  - test
  - build
  - changelog
  - deploy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

before_script:
  - python -m venv venv
  - source venv/bin/activate
  - pip install --upgrade pip
  - pip install -r data-processor/requirements.txt
  - pip install ruff mypy bandit pytest pytest-cov pip-audit

format:
  stage: format
  script:
    - ruff format --check .
    - ruff check .

lint:
  stage: lint
  script:
    # Ensure linters run but don't fail immediately if permissive
    - ruff check .

type_check:
  stage: type_check
  script:
    - mypy . --ignore-missing-imports

security_bandit:
  stage: security
  script:
    - bandit -r . -ll -c pyproject.toml

security_gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  before_script: []
  script:
    - gitleaks detect --source . -v

dependency_audit:
  stage: dependency-audit
  script:
    - pip-audit --format json > pip-audit-report.json
  artifacts:
    paths:
      - pip-audit-report.json
    when: always

test:
  stage: test
  script:
    - pytest --cov=. --cov-report=xml --cov-report=term --junitxml=report.xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

coverage_enforcement:
  stage: test
  needs: ["test"]
  script:
    - echo "Enforcing coverage threshold..."
    - coverage report --fail-under=85

build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script: []
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

changelog:
  stage: changelog
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
    - curl -L https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-linux.tar.gz | tar -xz
    - mv git-cliff-*/git-cliff /usr/local/bin/
  script:
    - git-cliff --unreleased --prepend CHANGELOG.md
  rules:
    - if: $CI_COMMIT_TAG

deploy_staging:
  stage: deploy
  script:
    - echo "Deploying to staging environment via Render API..."
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
