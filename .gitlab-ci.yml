variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip
    - .cache/npm
    - node_modules/

stages:
  - format
  - lint
  - type_check
  - security
  - dependency-audit
  - test
  - build
  - changelog
  - deploy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

.python_setup:
  image: python:3.11-slim
  before_script:
    - python -m venv venv
    - . venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install ruff mypy bandit pytest pytest-cov pip-audit coverage

frontend_format:
  stage: format
  image: node:20-alpine
  before_script:
    - npm install
  script:
    - npm run format:check

backend_format:
  extends: .python_setup
  stage: format
  script:
    - ruff format --check .
    - ruff check .

frontend_lint:
  stage: lint
  image: node:20-alpine
  before_script:
    - npm install
  script:
    - npm run lint
    - npm run deadcode

backend_lint:
  extends: .python_setup
  stage: lint
  script:
    - ruff check .

type_check:
  extends: .python_setup
  stage: type_check
  script:
    - mypy . --ignore-missing-imports

security_bandit:
  extends: .python_setup
  stage: security
  script:
    - bandit -r . -ll -c pyproject.toml

security_gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  before_script: []
  script:
    - gitleaks detect --source . -v

dependency_audit:
  extends: .python_setup
  stage: dependency-audit
  script:
    - pip-audit --format json --output pip-audit-report.json
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - pip-audit-report.json

backend_coverage:
  extends: .python_setup
  stage: test
  script:
    - pytest --cov=. --cov-fail-under=85 --cov-report=term-missing --cov-report=xml:coverage/backend/coverage.xml --cov-report=html:coverage/backend/html --junitxml=coverage/backend/junit.xml
    - coverage report --precision=2
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+(?:\.\d+)?)%/'
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - coverage/backend/
    reports:
      junit: coverage/backend/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/backend/coverage.xml

frontend_coverage:
  stage: test
  image: node:20-alpine
  before_script:
    - npm install
  script:
    - npm run test:ci
  coverage: '/All files[^|]*\|[^|]*\s+(\d+(?:\.\d+)?)/'
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - coverage/frontend/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/frontend/cobertura-coverage.xml

build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script: []
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" .
    - docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

changelog:
  stage: changelog
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
    - curl -L https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-linux.tar.gz | tar -xz
    - mv git-cliff-*/git-cliff /usr/local/bin/
  script:
    - git-cliff --unreleased --prepend CHANGELOG.md
  rules:
    - if: $CI_COMMIT_TAG

deploy_staging:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying to staging environment via Render API..."
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
