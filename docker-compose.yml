version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - data-processor
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    volumes:
      - ./instance:/app/instance
    networks:
      - app-network
    restart: unless-stopped

  data-processor:
    build:
      context: ./data-processor
      dockerfile: Dockerfile
    expose:
      - "8000"
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
