name: Python CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r ml-requirements.txt
         
    - name: Run Pytest
      run: |
        python -m pytest

    - name: Install Biome
      run: npm install

    - name: Run Biome Check
      run: npm run check

    - name: Run Type Check
      run: |
        pip install mypy
        mypy app run.py --ignore-missing-imports

    - name: Run Security Check
      run: |
        pip install bandit
        bandit -r . -ll -x tests/
