<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Processing Application</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Data Processor API</h1>
            <p>Send JSON payload to the processing engine.</p>
        </header>
        
        <form id="data-form">
            <div class="form-group">
                <label for="json-input">Input JSON Data:</label>
                <textarea id="json-input" rows="10" placeholder='{"key": "value", "count": 42}' required></textarea>
            </div>
            <button type="submit" id="submit-btn">Process Data</button>
        </form>
        
        <section id="response-container" class="hidden">
            <h2>Processing Result</h2>
            <div class="response-wrapper">
                <pre id="response-output"></pre>
            </div>
        </section>
    </main>
    
    <script src="/static/app.js"></script>
</body>
</html>
