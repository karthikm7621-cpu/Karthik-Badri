repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        files: \.(py)$

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        files: \.(py)$

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npx eslint --fix --no-error-on-unmatched-pattern
        language: system
        files: \.(js|jsx|ts|tsx)$
        pass_filenames: true
